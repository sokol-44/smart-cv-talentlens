<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded Black Square Container -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0c0f12" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Matrix Binary Code Columns (glowing green digits) -->
  <g font-family="monospace" font-size="7" font-weight="bold" fill="#22c55e" opacity="0.35">
    <text x="6" y="12">0</text>
    <text x="6" y="20">0</text>
    <text x="6" y="28">1</text>
    <text x="6" y="36">0</text>
    <text x="6" y="44">1</text>
    <text x="6" y="52">1</text>

    <text x="14" y="10">1</text>
    <text x="14" y="18">1</text>
    <text x="14" y="26">0</text>
    <text x="14" y="34">1</text>

    <text x="44" y="12">1</text>
    <text x="44" y="20">0</text>
    <text x="44" y="28">1</text>
    <text x="44" y="36">0</text>

    <text x="52" y="10">0</text>
    <text x="52" y="18">1</text>
    <text x="52" y="26">1</text>
    <text x="52" y="34">0</text>
    <text x="52" y="42">1</text>
    <text x="52" y="50">0</text>
  </g>

  <!-- Coder Character -->
  <!-- Body / Purple Shirt -->
  <path d="M 16 54 C 16 43, 22 37, 32 37 C 42 37, 48 43, 48 54 Z" fill="#7c3aed"/>

  <!-- Neck -->
  <rect x="30" y="32" width="4" height="6" fill="#fcd34d"/>

  <!-- Face -->
  <circle cx="32" cy="25" r="9.5" fill="#fcd34d"/>

  <!-- Hair (Brown hair swept to the side) -->
  <path d="M 22.5 24 C 22.5 15, 41.5 15, 41.5 24 C 41.5 21.5, 36 18.5, 32 19.5 C 28 20.5, 24 21.5, 22.5 24 Z" fill="#78350f"/>
  <path d="M 22.5 23 C 22.5 23, 21.5 28, 25 29 C 26 27, 25 24, 25 23 Z" fill="#78350f"/>

  <!-- Eyes -->
  <circle cx="29" cy="25.5" r="1.5" fill="#0f172a"/>
  <circle cx="35" cy="25.5" r="1.5" fill="#0f172a"/>

  <!-- Smile -->
  <path d="M 29.5 29 Q 32 31 34.5 29" stroke="#0f172a" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Hands typing -->
  <circle cx="17" cy="49" r="3" fill="#fcd34d"/>
  <circle cx="47" cy="49" r="3" fill="#fcd34d"/>

  <!-- Laptop (Back side facing viewer) -->
  <!-- Screen Lid -->
  <rect x="20" y="38" width="24" height="15" rx="2.5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>

  <!-- 4-squared logo on laptop lid -->
  <g opacity="0.8">
    <rect x="30.5" y="43.5" width="2" height="2" fill="#38bdf8"/>
    <rect x="33.5" y="43.5" width="2" height="2" fill="#38bdf8"/>
    <rect x="30.5" y="46.5" width="2" height="2" fill="#38bdf8"/>
    <rect x="33.5" y="46.5" width="2" height="2" fill="#38bdf8"/>
  </g>

  <!-- Keyboard Base -->
  <path d="M 16 53 L 48 53 L 51 58 L 13 58 Z" fill="#cbd5e1" stroke="#94a3b8" stroke-width="0.75"/>
  <path d="M 18 53 L 46 53 L 49 57 L 15 57 Z" fill="#e2e8f0"/>
</svg>
